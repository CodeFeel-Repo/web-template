<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>손맛코딩 | 게임 플레이 페이지</title>
  <style>
    :root {
      --bg: #151617;
      --surface: rgba(28, 31, 33, 0.92);
      --surface-soft: rgba(255, 255, 255, 0.06);
      --ink: #f3f4f5;
      --muted: #b5bcc2;
      --accent: #ff7a00;
      --accent-soft: rgba(255, 122, 0, 0.14);
      --line: rgba(255, 255, 255, 0.1);
      --shadow: 0 26px 72px rgba(0, 0, 0, 0.34);
      --space-section: 1.2rem;
      --space-card: 1.5rem;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Malgun Gothic", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top, rgba(255, 122, 0, 0.2), transparent 26%),
        linear-gradient(180deg, #191b1d 0%, var(--bg) 100%);
    }

    a, button { font: inherit; }

    .page {
      width: min(1080px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 1.2rem 0 3.2rem;
    }

    .nav,
    .hero,
    .board,
    .footer-box {
      background: var(--surface);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .nav,
    .footer-box {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.2rem;
      border-radius: 1.4rem;
    }

    .brand,
    .links,
    .controls,
    .score {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      flex-wrap: wrap;
    }

    .brand,
    .links a {
      color: inherit;
      text-decoration: none;
    }

    .brand { font-weight: 700; }

    .mark {
      width: 2.5rem;
      height: 2.5rem;
      display: grid;
      place-items: center;
      border-radius: 0.85rem;
      background: linear-gradient(145deg, #ff7a00, #ffb347);
      color: #1b130b;
      font-weight: 800;
    }

    .hero {
      margin-top: var(--space-section);
      padding: var(--space-card);
      border-radius: 2rem;
    }

    .eyebrow {
      display: inline-flex;
      padding: 0.35rem 0.7rem;
      border-radius: 999px;
      background: var(--accent-soft);
      color: #ffb875;
      font-size: 0.82rem;
      font-weight: 700;
    }

    h1 {
      margin: 1rem 0 0.9rem;
      font-size: clamp(2.1rem, 6vw, 4.4rem);
      line-height: 0.96;
      letter-spacing: -0.05em;
    }

    p,
    span {
      margin: 0;
      color: var(--muted);
      line-height: 1.75;
    }

    .board {
      margin-top: var(--space-section);
      padding: var(--space-card);
      border-radius: 2rem;
    }

    .score {
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.2rem;
    }

    .score-box {
      flex: 1;
      min-width: 10rem;
      padding: 1.1rem;
      border-radius: 1.2rem;
      background: var(--surface-soft);
      border: 1px solid var(--line);
    }

    .score-box strong {
      display: block;
      margin-bottom: 0.25rem;
      font-size: 1.4rem;
      color: var(--ink);
    }

    .controls {
      margin-bottom: 1.2rem;
    }

    button {
      border: 0;
      border-radius: 999px;
      min-height: 3rem;
      padding: 0.8rem 1.2rem;
      cursor: pointer;
      font-weight: 700;
    }

    .primary {
      background: var(--accent);
      color: #1b130b;
    }

    .secondary {
      background: rgba(255, 255, 255, 0.08);
      color: var(--ink);
      border: 1px solid var(--line);
    }

    .play-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.95rem;
    }

    .tile {
      min-height: 8.4rem;
      border-radius: 1.3rem;
      border: 1px solid var(--line);
      background: linear-gradient(145deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
      color: var(--ink);
      display: grid;
      place-items: center;
      font-size: 2rem;
      font-weight: 800;
    }

    .footer-box a {
      color: inherit;
      text-decoration: none;
      font-weight: 700;
    }

    .footer-box {
      margin-top: var(--space-section);
    }

    @media (max-width: 820px) {
      .play-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .page {
        width: min(100% - 1.2rem, 1080px);
        padding: 0.9rem 0 2.4rem;
      }

      .nav,
      .footer-box,
      .score {
        flex-direction: column;
        align-items: start;
      }

      .play-grid {
        grid-template-columns: 1fr;
      }

      .hero,
      .board {
        padding: 1.25rem;
        border-radius: 1.6rem;
      }

      .tile {
        min-height: 6.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="nav">
      <a class="brand" href="index.html">
        <span class="mark">G</span>
        <span>손맛코딩 Play</span>
      </a>
      <nav class="links">
        <a href="index.html">랜딩</a>
        <a href="list.html">목록</a>
        <a href="app.html">사용자 정보</a>
        <a href="game.html">게임</a>
      </nav>
    </header>

    <main>
      <section class="hero">
        <span class="eyebrow">Mini Game</span>
        <h1>빠르게 눌러서<br>점수를 올리는<br>플레이 화면</h1>
        <p>가벼운 인터랙션을 즉시 확인할 수 있도록 간단한 타일 점수 게임 형태로 구성했습니다.</p>
      </section>

      <section class="board">
        <div class="score">
          <div class="score-box">
            <strong id="score">0</strong>
            <span>현재 점수</span>
          </div>
          <div class="score-box">
            <strong id="best">0</strong>
            <span>최고 점수</span>
          </div>
        </div>

        <div class="controls">
          <button class="primary" id="startButton" type="button">게임 시작</button>
          <button class="secondary" id="resetButton" type="button">기록 초기화</button>
        </div>

        <div class="play-grid" id="playGrid">
          <button class="tile" type="button">?</button>
          <button class="tile" type="button">?</button>
          <button class="tile" type="button">?</button>
          <button class="tile" type="button">?</button>
          <button class="tile" type="button">?</button>
          <button class="tile" type="button">?</button>
        </div>
      </section>
    </main>

    <footer class="footer-box">
      <a href="list.html">목록으로 돌아가기</a>
      <a href="index.html">랜딩으로 이동</a>
    </footer>
  </div>

  <script>
    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const playGrid = document.getElementById("playGrid");
    const tiles = Array.from(playGrid.querySelectorAll(".tile"));
    const startButton = document.getElementById("startButton");
    const resetButton = document.getElementById("resetButton");

    let score = 0;
    let best = Number(localStorage.getItem("sonmat-best-score") || 0);
    let activeIndex = -1;

    function render() {
      scoreEl.textContent = String(score);
      bestEl.textContent = String(best);
      tiles.forEach((tile, index) => {
        const isActive = index === activeIndex;
        tile.textContent = isActive ? "HIT" : "?";
        tile.style.background = isActive
          ? "linear-gradient(145deg, rgba(255,122,0,0.95), rgba(255,190,92,0.95))"
          : "linear-gradient(145deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02))";
        tile.style.color = isActive ? "#22160b" : "#f3f4f5";
      });
    }

    function pickNextTile() {
      activeIndex = Math.floor(Math.random() * tiles.length);
      render();
    }

    function updateBest() {
      if (score > best) {
        best = score;
        localStorage.setItem("sonmat-best-score", String(best));
      }
    }

    startButton.addEventListener("click", () => {
      pickNextTile();
    });

    resetButton.addEventListener("click", () => {
      score = 0;
      best = 0;
      activeIndex = -1;
      localStorage.removeItem("sonmat-best-score");
      render();
    });

    tiles.forEach((tile, index) => {
      tile.addEventListener("click", () => {
        if (index !== activeIndex) {
          score = Math.max(0, score - 1);
          render();
          return;
        }

        score += 1;
        updateBest();
        pickNextTile();
      });
    });

    render();
  </script>
</body>
</html>
