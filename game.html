<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>손맛코딩 | Tactical Game</title>
  <style>
    :root {
      --bg: #090b10;
      --panel: rgba(16, 20, 28, 0.92);
      --panel-soft: rgba(255, 255, 255, 0.04);
      --ink: #edf6ef;
      --muted: #9aa7a2;
      --accent: #ff7a00;
      --signal: #9dff72;
      --line: rgba(255, 255, 255, 0.14);
      --shadow: 0 26px 72px rgba(0, 0, 0, 0.4);
      --space-section: 1.2rem;
      --space-card: 1.5rem;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", "Malgun Gothic", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(rgba(109, 255, 154, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(109, 255, 154, 0.06) 1px, transparent 1px),
        radial-gradient(circle at top, rgba(255, 122, 0, 0.22), transparent 26%),
        linear-gradient(180deg, #0d1118 0%, #090b10 100%);
      background-size: 28px 28px, 28px 28px, auto, auto;
    }

    a, button { font: inherit; }

    .page {
      width: min(1080px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 1.2rem 0 3.2rem;
    }

    .nav,
    .hero,
    .board,
    .footer-box {
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      position: relative;
      overflow: hidden;
    }

    .nav::before,
    .hero::before,
    .board::before,
    .footer-box::before,
    .score-box::before,
    .tile::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(157, 255, 114, 0.05), transparent 42%, rgba(255, 122, 0, 0.08));
      pointer-events: none;
    }

    .nav,
    .footer-box {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.2rem;
      border-radius: 1rem;
    }

    .brand,
    .links,
    .controls,
    .score {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }

    .brand,
    .links a {
      color: inherit;
      text-decoration: none;
    }

    .brand {
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .mark {
      width: 2.5rem;
      height: 2.5rem;
      display: grid;
      place-items: center;
      clip-path: polygon(14% 0, 100% 0, 100% 84%, 86% 100%, 0 100%, 0 16%);
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: linear-gradient(145deg, rgba(255, 122, 0, 0.8), rgba(157, 255, 114, 0.2));
      color: #120d08;
      font-weight: 800;
    }

    .hero {
      margin-top: var(--space-section);
      padding: var(--space-card);
      border-radius: 1.2rem;
    }

    .hero > *,
    .board > *,
    .footer-box > * {
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      display: inline-flex;
      padding: 0.4rem 0.75rem;
      border-radius: 0.32rem;
      background: rgba(157, 255, 114, 0.08);
      border: 1px solid rgba(157, 255, 114, 0.24);
      color: var(--signal);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 1rem 0 0.9rem;
      font-size: clamp(2.2rem, 6vw, 4.4rem);
      line-height: 0.96;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    p,
    span {
      margin: 0;
      color: var(--muted);
      line-height: 1.75;
    }

    .board {
      margin-top: var(--space-section);
      padding: var(--space-card);
      border-radius: 1.2rem;
    }

    .score {
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.2rem;
    }

    .score-box {
      flex: 1;
      min-width: 10rem;
      padding: 1.1rem;
      border-radius: 0.95rem;
      background: var(--panel-soft);
      border: 1px solid var(--line);
      position: relative;
      overflow: hidden;
    }

    .score-box strong {
      display: block;
      margin-bottom: 0.25rem;
      font-size: 1.4rem;
      color: var(--signal);
      position: relative;
      z-index: 1;
    }

    .controls { margin-bottom: 1.2rem; }

    button {
      border: 0;
      border-radius: 0.35rem;
      min-height: 3rem;
      padding: 0.82rem 1.2rem;
      cursor: pointer;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .primary {
      background: linear-gradient(135deg, #ff7a00, #ff5100);
      color: #120d08;
    }

    .secondary {
      background: rgba(157, 255, 114, 0.08);
      color: var(--signal);
      border: 1px solid rgba(157, 255, 114, 0.2);
    }

    .play-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.95rem;
    }

    .tile {
      min-height: 8.4rem;
      border-radius: 0.95rem;
      border: 1px solid var(--line);
      background: linear-gradient(145deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
      color: var(--ink);
      display: grid;
      place-items: center;
      font-size: 2rem;
      font-weight: 800;
      position: relative;
      overflow: hidden;
    }

    .footer-box a {
      color: inherit;
      text-decoration: none;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .footer-box { margin-top: var(--space-section); }

    @media (max-width: 820px) {
      .play-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 640px) {
      .page {
        width: min(100% - 1.2rem, 1080px);
        padding: 0.9rem 0 2.4rem;
      }

      .nav,
      .footer-box,
      .score {
        flex-direction: column;
        align-items: start;
      }

      .play-grid { grid-template-columns: 1fr; }
      .hero,
      .board { padding: 1.25rem; }
      .tile { min-height: 6.8rem; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="nav">
      <a class="brand" href="index.html">
        <span class="mark">G</span>
        <span>Sonmat Play</span>
      </a>
      <nav class="links">
        <a href="index.html">Landing</a>
        <a href="list.html">List</a>
        <a href="app.html">Profile</a>
        <a href="game.html">Game</a>
      </nav>
    </header>

    <main>
      <section class="hero">
        <span class="eyebrow">Mini Game / Combat Drill</span>
        <h1>Hit the live<br>target and<br>raise the score</h1>
        <p>가벼운 인터랙션을 즉시 확인할 수 있도록 간단한 타일 점수 게임 형태를 유지하면서, 전술 HUD 분위기로 테마를 맞췄습니다.</p>
      </section>

      <section class="board">
        <div class="score">
          <div class="score-box">
            <strong id="score">0</strong>
            <span>현재 점수</span>
          </div>
          <div class="score-box">
            <strong id="best">0</strong>
            <span>최고 점수</span>
          </div>
        </div>

        <div class="controls">
          <button class="primary" id="startButton" type="button">게임 시작</button>
          <button class="secondary" id="resetButton" type="button">기록 초기화</button>
        </div>

        <div class="play-grid" id="playGrid">
          <button class="tile" type="button">?</button>
          <button class="tile" type="button">?</button>
          <button class="tile" type="button">?</button>
          <button class="tile" type="button">?</button>
          <button class="tile" type="button">?</button>
          <button class="tile" type="button">?</button>
        </div>
      </section>
    </main>

    <footer class="footer-box">
      <a href="list.html">Back to List</a>
      <a href="index.html">Open Landing</a>
    </footer>
  </div>

  <script>
    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const playGrid = document.getElementById("playGrid");
    const tiles = Array.from(playGrid.querySelectorAll(".tile"));
    const startButton = document.getElementById("startButton");
    const resetButton = document.getElementById("resetButton");

    let score = 0;
    let best = Number(localStorage.getItem("sonmat-best-score") || 0);
    let activeIndex = -1;

    function render() {
      scoreEl.textContent = String(score);
      bestEl.textContent = String(best);
      tiles.forEach((tile, index) => {
        const isActive = index === activeIndex;
        tile.textContent = isActive ? "HIT" : "?";
        tile.style.background = isActive
          ? "linear-gradient(145deg, rgba(255,122,0,0.95), rgba(157,255,114,0.78))"
          : "linear-gradient(145deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02))";
        tile.style.color = isActive ? "#120d08" : "#edf6ef";
        tile.style.boxShadow = isActive
          ? "0 0 24px rgba(255,122,0,0.28), inset 0 0 16px rgba(255,255,255,0.14)"
          : "none";
      });
    }

    function pickNextTile() {
      activeIndex = Math.floor(Math.random() * tiles.length);
      render();
    }

    function updateBest() {
      if (score > best) {
        best = score;
        localStorage.setItem("sonmat-best-score", String(best));
      }
    }

    startButton.addEventListener("click", () => {
      pickNextTile();
    });

    resetButton.addEventListener("click", () => {
      score = 0;
      best = 0;
      activeIndex = -1;
      localStorage.removeItem("sonmat-best-score");
      render();
    });

    tiles.forEach((tile, index) => {
      tile.addEventListener("click", () => {
        if (index !== activeIndex) {
          score = Math.max(0, score - 1);
          render();
          return;
        }

        score += 1;
        updateBest();
        pickNextTile();
      });
    });

    render();
  </script>
</body>
</html>
